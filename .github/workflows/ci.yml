name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Install npm dependencies
        run: npm install --package-lock=false

      - name: Syntax check
        run: npm run check

      - name: Generated files
        run: npm run build:check

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
